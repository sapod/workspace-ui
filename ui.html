<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>opencode</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin></script>
<style>
/* ── Tokens ──────────────────────────────────────────── */
:root{
  --bg:#0b0b0e; --bg2:#101013; --bg3:#161619; --bg4:#1c1c21; --bg5:#222228;
  --border:#222228; --border2:#2e2e38;
  --text:#e0e0ec; --text2:#85859e; --text3:#424258;
  --accent:#6655f6; --accenthi:#9080ff; --accentg:rgba(102,85,246,.12);
  --green:#32cc76; --red:#e05555; --yellow:#e0a020; --cyan:#20c0e0; --orange:#e07040;
  --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.5;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
#root{display:flex;height:100dvh}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar{
  width:260px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:50;overflow:hidden;
}
@media(max-width:640px){
  .sidebar{position:fixed;inset:0 auto 0 0;width:min(85vw,300px);
    transform:translateX(-105%);transition:transform .26s cubic-bezier(.3,0,.2,1)}
  .sidebar.open{transform:translateX(0);box-shadow:16px 0 48px rgba(0,0,0,.6)}
}
.veil{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:49;
  opacity:0;transition:opacity .22s;pointer-events:none}
@media(max-width:640px){.veil{display:block}.veil.open{opacity:1;pointer-events:all}}

/* Sidebar header */
.sb-hd{padding:calc(12px + var(--st)) 14px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;color:var(--accenthi);font-size:14px;font-weight:600}
.logo-orb{width:20px;height:20px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 35%,var(--accenthi),var(--accent));
  box-shadow:0 0 10px var(--accentg)}
.sb-x{display:none;background:none;border:none;cursor:pointer;color:var(--text3);
  font-size:20px;line-height:1;padding:2px 6px;border-radius:6px;transition:color .15s}
.sb-x:hover{color:var(--text)}
@media(max-width:640px){.sb-x{display:block}}

/* New project button */
.new-proj-btn{
  margin:10px;flex-shrink:0;border:1.5px dashed var(--border2);border-radius:10px;
  background:none;color:var(--accenthi);font-family:inherit;font-size:12px;
  padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:background .15s,border-color .15s}
.new-proj-btn:hover,.new-proj-btn:active{background:var(--accentg);border-color:var(--accent)}

/* Project list */
.sb-scroll{flex:1;overflow-y:auto;padding:4px 6px}
.proj-group{margin-bottom:2px}
.proj-row{
  display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;
  cursor:pointer;transition:background .1s;user-select:none;-webkit-user-select:none}
.proj-row:hover{background:var(--bg4)}
.proj-row.active-proj{background:var(--bg4)}
.proj-chevron{font-size:10px;color:var(--text3);width:12px;text-align:center;flex-shrink:0;transition:transform .15s}
.proj-chevron.open{transform:rotate(90deg)}
.proj-ico{font-size:16px;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-path{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.proj-del{opacity:0;background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:13px;padding:4px;border-radius:5px;flex-shrink:0;transition:opacity .15s,color .15s}
.proj-row:hover .proj-del{opacity:1}
.proj-del:hover{color:var(--red)}
@media(max-width:640px){.proj-del{opacity:.5}}

/* Session list inside a project */
.sess-list{padding:0 0 4px 22px}
.sess-row{
  display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;
  cursor:pointer;transition:background .1s;position:relative}
.sess-row:hover{background:var(--bg4)}
.sess-row.active{background:var(--bg4)}
.sess-row.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.sess-name{flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-row.active .sess-name{color:var(--accenthi)}
.sess-del{opacity:0;background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:12px;padding:3px 5px;border-radius:4px;flex-shrink:0;transition:opacity .15s,color .15s}
.sess-row:hover .sess-del{opacity:1}
.sess-del:hover{color:var(--red)}
@media(max-width:640px){.sess-del{opacity:.5}}

/* New session button inside project */
.new-sess-row{
  display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;
  cursor:pointer;font-size:11px;color:var(--text3);transition:background .1s,color .1s;margin-top:1px}
.new-sess-row:hover{background:var(--bg4);color:var(--accenthi)}

/* Sidebar footer */
.sb-ft{padding:8px 12px calc(8px + var(--sb));border-top:1px solid var(--border);
  display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text3);flex-shrink:0}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;transition:background .3s,box-shadow .3s}
.s-dot.on{background:var(--green);box-shadow:0 0 7px var(--green)}

/* ── Main ────────────────────────────────────────────── */
.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* Topbar */
.topbar{
  height:50px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;padding-top:var(--st)}
.burger{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;
  border-radius:8px;display:flex;flex-direction:column;gap:4px;align-items:center;flex-shrink:0;transition:background .15s}
.burger:hover,.burger:active{background:var(--bg4);color:var(--text)}
.burger span{display:block;width:17px;height:2px;background:currentColor;border-radius:2px}
.tb-info{flex:1;min-width:0}
.tb-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-status{font-size:10px;padding:3px 8px;border-radius:5px;flex-shrink:0}
.tb-status.idle{color:var(--text3);border:1px solid var(--border)}
.tb-status.thinking{color:var(--yellow);border:1px solid rgba(224,160,32,.3);background:rgba(224,160,32,.06)}
.tb-abort{background:none;border:1px solid var(--red);color:var(--red);font-family:inherit;
  font-size:11px;padding:4px 10px;border-radius:7px;cursor:pointer;transition:background .15s;flex-shrink:0}
.tb-abort:hover{background:rgba(224,85,85,.1)}

/* Thread */
.thread{flex:1;overflow-y:auto;display:flex;flex-direction:column;
  padding:12px 0 4px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}

/* Messages */
.msg{padding:6px 14px}
@media(min-width:641px){.msg{padding:6px 28px}}
.msg-who{font-size:9px;text-transform:uppercase;letter-spacing:.09em;font-weight:600;margin-bottom:3px}
.who-u{color:var(--accenthi)} .who-ai{color:var(--cyan)} .who-sys{color:var(--text3)}

.msg.is-user{display:flex;flex-direction:column;align-items:flex-end}
.msg.is-user .msg-who{align-self:flex-end}
.bub-u{
  background:linear-gradient(135deg,rgba(102,85,246,.16),rgba(102,85,246,.09));
  border:1px solid rgba(102,85,246,.25);border-radius:14px 14px 3px 14px;
  padding:9px 13px;color:var(--text);font-size:13px;line-height:1.6;
  word-break:break-word;white-space:pre-wrap;max-width:85%}
@media(max-width:640px){.bub-u{max-width:94%}}

.bub-ai{color:var(--text);font-size:13px;line-height:1.7;word-break:break-word;white-space:pre-wrap;width:100%}
.bub-ai code{background:var(--bg3);color:var(--cyan);padding:1px 4px;border-radius:3px;font-size:.87em}

/* Code block */
.code-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:9px;margin:7px 0;overflow:hidden}
.code-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:6px 13px;background:var(--bg4);border-bottom:1px solid var(--border)}
.code-lang{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.copy-btn{font-size:10px;color:var(--text3);background:none;border:none;font-family:inherit;
  padding:2px 7px;border-radius:4px;cursor:pointer;transition:color .15s}
.copy-btn:hover{color:var(--text);background:var(--bg)}
.code-wrap pre{padding:11px 13px;overflow-x:auto;font-size:12px;line-height:1.6}

/* Tool block */
.tool-wrap{border:1px solid var(--border);border-radius:9px;margin:5px 0;overflow:hidden;font-size:12px}
.tool-hdr{display:flex;align-items:center;gap:7px;padding:7px 11px;background:var(--bg3);cursor:pointer;user-select:none}
.tool-hdr:hover{background:var(--bg4)}
.tool-label{color:var(--orange);font-weight:500}
.tool-st{margin-left:auto;font-size:9px}
.tool-st.ok{color:var(--green)}.tool-st.run{color:var(--yellow)}.tool-st.err{color:var(--red)}
.tool-body{padding:9px 11px;background:var(--bg2);border-top:1px solid var(--border)}
.tool-body pre{font-size:10px;color:var(--text2);white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto}

/* Thinking */
.thinking-row{display:flex;align-items:center;gap:9px;padding:8px 14px;color:var(--text3);font-size:11px}
@media(min-width:641px){.thinking-row{padding:8px 28px}}
.spin{width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.dots span{animation:dp 1.3s ease-in-out infinite;display:inline-block}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.2}50%{opacity:1}}

/* Empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--text3);padding:32px 20px;text-align:center}
.empty-orb{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--bg5),var(--bg3));
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.4}
.empty-h{font-size:15px;font-weight:600;color:var(--text2)}
.empty-p{font-size:11px;line-height:1.9;max-width:260px}

/* Context note */
.ctx-note{margin:4px 14px 8px;padding:7px 11px;background:var(--bg3);border-left:2px solid var(--border2);
  border-radius:0 7px 7px 0;font-size:10px;color:var(--text3);line-height:1.6}
.ctx-note code{background:var(--bg4);color:var(--text2);padding:1px 4px;border-radius:3px}
@media(min-width:641px){.ctx-note{margin:4px 28px 8px}}

/* ── Input ───────────────────────────────────────────── */
.inp-area{flex-shrink:0;border-top:1px solid var(--border);background:var(--bg2);
  padding:9px 11px calc(9px + var(--sb))}
@media(min-width:641px){.inp-area{padding:10px 22px}}
.inp-rel{position:relative}
.slash-pop{position:absolute;bottom:calc(100% + 7px);left:0;right:0;background:var(--bg3);
  border:1px solid var(--border2);border-radius:11px;overflow:hidden;z-index:60;
  box-shadow:0 -10px 36px rgba(0,0,0,.45);max-height:200px;overflow-y:auto}
.sl-row{display:flex;align-items:baseline;gap:9px;padding:9px 13px;cursor:pointer;transition:background .1s}
.sl-row:hover,.sl-row.sel{background:var(--bg4)}
.sl-cmd{color:var(--accenthi);font-size:12px;font-weight:500}
.sl-desc{color:var(--text3);font-size:10px}
.inp-shell{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;
  display:flex;flex-direction:column;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.inp-shell.focused{border-color:rgba(102,85,246,.5);box-shadow:0 0 0 3px rgba(102,85,246,.07)}
.msg-ta{background:none;border:none;outline:none;color:var(--text);font-family:inherit;
  font-size:13px;padding:11px 13px 5px;resize:none;min-height:46px;max-height:150px;
  line-height:1.55;-webkit-appearance:none}
.msg-ta::placeholder{color:var(--text3)}
.inp-foot{display:flex;align-items:center;gap:7px;padding:6px 9px 8px;border-top:1px solid var(--border)}
.inp-hint{flex:1;font-size:9px;color:var(--text3)}
@media(max-width:640px){.inp-hint{display:none}}
kbd{background:var(--bg4);border:1px solid var(--border2);border-radius:3px;padding:1px 4px;font-family:inherit;font-size:8px}
.send-btn{background:var(--accent);border:none;color:#fff;font-family:inherit;font-size:12px;
  font-weight:500;padding:7px 16px;border-radius:8px;cursor:pointer;flex-shrink:0;
  transition:background .15s,transform .1s;-webkit-appearance:none}
.send-btn:hover{background:var(--accenthi)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.32;cursor:not-allowed}

/* ── Modals ──────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);
  -webkit-backdrop-filter:blur(5px);z-index:100;display:flex;align-items:center;
  justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:opacity .18s}
.overlay.open{opacity:1;pointer-events:all}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;
  max-width:440px;max-height:82dvh;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 28px 70px rgba(0,0,0,.6);transform:translateY(12px) scale(.97);transition:transform .18s}
.overlay.open .mbox{transform:translateY(0) scale(1)}
@media(max-width:640px){
  .overlay{align-items:flex-end;padding:0}
  .mbox{max-width:100%;border-radius:18px 18px 0 0;max-height:88dvh}
  .mbox::before{content:'';display:block;width:34px;height:4px;background:var(--border2);border-radius:2px;margin:11px auto 0}}
.mhdr{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.m-title{font-size:14px;font-weight:600;color:var(--text)}
.m-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;
  padding:2px 6px;border-radius:6px;line-height:1;transition:color .15s}
.m-x:hover{color:var(--text);background:var(--bg4)}
.mbody{padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.field input{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  font-family:inherit;font-size:13px;padding:10px 12px;border-radius:9px;outline:none;
  transition:border-color .15s;-webkit-appearance:none}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}
.field-note{font-size:10px;color:var(--text3);line-height:1.6}
.mfoot{display:flex;align-items:center;gap:9px;justify-content:flex-end;
  padding:12px 16px calc(12px + var(--sb));border-top:1px solid var(--border);flex-shrink:0}
@media(max-width:640px){.mfoot{padding-bottom:calc(16px + var(--sb))}}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--text2);font-family:inherit;
  font-size:12px;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}
.btn-ok{background:var(--accent);border:none;color:#fff;font-family:inherit;font-size:12px;
  font-weight:500;padding:8px 20px;border-radius:8px;cursor:pointer;transition:background .15s}
.btn-ok:hover{background:var(--accenthi)}
.btn-ok:disabled{opacity:.35;cursor:not-allowed}

/* Folder grid */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-top:3px}
.folder-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:7px 9px;cursor:pointer;font-size:11px;color:var(--text2);transition:all .12s}
.folder-chip:hover,.folder-chip:active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.folder-chip.sel{background:var(--accentg);border-color:var(--accent);color:var(--accenthi)}
.folder-chip span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Toast */
.toast{position:fixed;bottom:calc(18px + var(--sb));left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:12px;
  padding:8px 18px;border-radius:10px;z-index:999;white-space:nowrap;opacity:0;
  transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:0 6px 28px rgba(0,0,0,.35)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────────────────────
// API — all opencode HTTP calls
// ─────────────────────────────────────────────────────────────
const oc = {
  async req(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch('/api' + path, opts);
    if (!r.ok) {
      const txt = await r.text().catch(() => r.statusText);
      throw new Error(`${r.status}: ${txt.slice(0,120)}`);
    }
    if (r.status === 204) return null;
    const ct = r.headers.get('content-type') || '';
    return ct.includes('json') ? r.json() : r.text();
  },
  health:        ()          => oc.req('GET',    '/global/health'),
  listSessions:  ()          => oc.req('GET',    '/session'),
  createSession: (title)     => oc.req('POST',   '/session', { title }),
  deleteSession: (id)        => oc.req('DELETE', `/session/${id}`),
  abortSession:  (id)        => oc.req('POST',   `/session/${id}/abort`),
  forkSession:   (id)        => oc.req('POST',   `/session/${id}/fork`, {}),
  listMessages:  (id)        => oc.req('GET',    `/session/${id}/message`),
  // Blocking send — returns { info, parts } when complete
  sendMessage:   (id, parts) => oc.req('POST',   `/session/${id}/message`, { parts }),
  getPath:       ()          => oc.req('GET',    '/path'),
  listFiles:     (p)         => oc.req('GET',    `/file?path=${encodeURIComponent(p)}`),
  // SSE: global event stream
  eventUrl:      ()          => '/api/global/event',
};

// ─────────────────────────────────────────────────────────────
// Local storage — projects metadata
// ─────────────────────────────────────────────────────────────
const STORE = 'oc_projects_v1';
function loadProjects() { try { return JSON.parse(localStorage.getItem(STORE) || '[]'); } catch { return []; } }
function saveProjects(p) { try { localStorage.setItem(STORE, JSON.stringify(p)); } catch {} }

// ─────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────
function toolIcon(n = '') {
  n = n.toLowerCase();
  if (n.includes('read') || n.includes('file'))                       return '📄';
  if (n.includes('write') || n.includes('edit') || n.includes('patch')) return '✏️';
  if (n.includes('bash') || n.includes('shell') || n.includes('exec'))  return '⚡';
  if (n.includes('search') || n.includes('grep'))                     return '🔍';
  if (n.includes('list')   || n.includes('ls'))                       return '📂';
  if (n.includes('web')    || n.includes('fetch'))                    return '🌐';
  return '⚙️';
}

// ─────────────────────────────────────────────────────────────
// Markdown-lite
// ─────────────────────────────────────────────────────────────
function CodeBlock({ lang, code }) {
  const [copied, setCopied] = useState(false);
  return (
    <div className="code-wrap">
      <div className="code-hdr">
        <span className="code-lang">{lang || 'code'}</span>
        <button className="copy-btn" onClick={() => {
          navigator.clipboard.writeText(code);
          setCopied(true); setTimeout(() => setCopied(false), 1400);
        }}>{copied ? 'copied!' : 'copy'}</button>
      </div>
      <pre>{code}</pre>
    </div>
  );
}

function InlineText({ text }) {
  const html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  return <span dangerouslySetInnerHTML={{ __html: html }} />;
}

function RichText({ text, className }) {
  const parts = [];
  const re = /```(\w*)\n?([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ t: 'inline', v: text.slice(last, m.index) });
    parts.push({ t: 'code', lang: m[1], v: m[2].trim() });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ t: 'inline', v: text.slice(last) });
  return (
    <div className={className}>
      {parts.map((p, i) => p.t === 'code'
        ? <CodeBlock key={i} lang={p.lang} code={p.v} />
        : <InlineText key={i} text={p.v} />)}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// ToolBlock
// ─────────────────────────────────────────────────────────────
function ToolBlock({ inv }) {
  const [open, setOpen] = useState(false);
  const isRun = inv.state === 'call';
  const lines = [];
  if (inv.args) lines.push('INPUT:\n' + JSON.stringify(inv.args, null, 2));
  if (inv.result != null) {
    const r = typeof inv.result === 'string' ? inv.result : JSON.stringify(inv.result, null, 2);
    lines.push('OUTPUT:\n' + r.slice(0, 2000) + (r.length > 2000 ? '\n…' : ''));
  }
  return (
    <div className="tool-wrap">
      <div className="tool-hdr" onClick={() => setOpen(o => !o)}>
        <span>{toolIcon(inv.toolName)}</span>
        <span className="tool-label">{inv.toolName || 'tool'}</span>
        <span className={`tool-st ${isRun ? 'run' : 'ok'}`}>{isRun ? '● running' : '✓ done'}</span>
      </div>
      {open && <div className="tool-body"><pre>{lines.join('\n\n') || '(no details)'}</pre></div>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MessageBubble — one message from API: { info, parts }
// ─────────────────────────────────────────────────────────────
function MessageBubble({ msg }) {
  const role = msg?.info?.role ?? msg?.role;
  const parts = msg?.parts ?? [];

  if (role === 'user') {
    const text = parts.find(p => p.type === 'text')?.text ?? '';
    if (!text) return null;
    return (
      <div className="msg is-user">
        <div className="msg-who who-u">You</div>
        <RichText text={text} className="bub-u" />
      </div>
    );
  }

  if (role === 'assistant') {
    return (
      <div className="msg">
        <div className="msg-who who-ai">opencode</div>
        {parts.map((p, i) => {
          if (p.type === 'text') return <RichText key={i} text={p.text || ''} className="bub-ai" />;
          if (p.type === 'tool-invocation') return <ToolBlock key={i} inv={p.toolInvocation || {}} />;
          return null;
        })}
      </div>
    );
  }
  return null;
}

// ─────────────────────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────────────────────
function useToast() {
  const [state, setState] = useState({ msg: '', show: false });
  const t = useRef();
  function toast(msg, dur = 2400) {
    setState({ msg, show: true });
    clearTimeout(t.current);
    t.current = setTimeout(() => setState(s => ({ ...s, show: false })), dur);
  }
  const el = <div className={`toast${state.show ? ' show' : ''}`}>{state.msg}</div>;
  return { toast, toastEl: el };
}

// ─────────────────────────────────────────────────────────────
// NewProjectModal — pick a subfolder from workspace
// ─────────────────────────────────────────────────────────────
function NewProjectModal({ open, onClose, onDone, toast }) {
  const [name,    setName]    = useState('');
  const [path,    setPath]    = useState('');
  const [selPath, setSelPath] = useState('');
  const [dirs,    setDirs]    = useState(null);
  const [busy,    setBusy]    = useState(false);

  useEffect(() => {
    if (!open) return;
    setName(''); setPath(''); setSelPath(''); setDirs(null);
    oc.getPath().then(pi => {
      const root = pi?.path ?? pi?.cwd ?? '';
      return oc.listFiles(root).then(nodes => {
        const list = (Array.isArray(nodes) ? nodes : [])
          .filter(n => n.type === 'directory' || n.isDirectory)
          .map(n => {
            const abs = n.path || n.name || '';
            const rel = root && abs.startsWith(root) ? abs.slice(root.length).replace(/^\/+/, '') : abs;
            return { label: rel.split('/').pop() || rel, rel, abs };
          })
          .filter(f => f.label && !f.label.startsWith('.'))
          .slice(0, 28);
        setDirs(list);
      });
    }).catch(() => setDirs([]));
  }, [open]);

  function pick(rel, label) {
    setSelPath(rel); setPath(rel);
    if (!name) setName(label);
  }

  function submit() {
    const n = name.trim(), p = (path || selPath).trim();
    if (!n) { toast('Enter a project name'); return; }
    setBusy(true);
    onDone({ name: n, path: p });
    setBusy(false);
  }

  return (
    <div className={`overlay${open ? ' open' : ''}`} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="mbox">
        <div className="mhdr">
          <span className="m-title">New Project</span>
          <button className="m-x" onClick={onClose}>✕</button>
        </div>
        <div className="mbody">
          <div className="field">
            <label>Project name</label>
            <input type="text" placeholder="e.g. project1" value={name}
              onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && submit()} autoFocus autoComplete="off" />
          </div>
          <div className="field">
            <label>Subfolder (working directory)</label>
            {dirs === null
              ? <div style={{fontSize:11,color:'var(--text3)',padding:'4px 0'}}>Scanning workspace…</div>
              : <div className="folder-grid">
                  <div className={`folder-chip${selPath === '' && path === '' ? ' sel' : ''}`}
                    onClick={() => { setSelPath(''); setPath(''); }}>
                    <span>🏠</span><span>workspace root</span>
                  </div>
                  {dirs.map(d => (
                    <div key={d.abs} className={`folder-chip${selPath === d.rel ? ' sel' : ''}`}
                      onClick={() => pick(d.rel, d.label)} title={d.abs}>
                      <span>📁</span><span>{d.label}</span>
                    </div>
                  ))}
                </div>
            }
            <input style={{marginTop:7}} type="text" placeholder="Or type a path…"
              value={path} onChange={e => { setPath(e.target.value); setSelPath(''); }}
              onKeyDown={e => e.key === 'Enter' && submit()} autoComplete="off" />
            <span className="field-note">opencode will be instructed to treat this as the project root for all file and shell operations.</span>
          </div>
        </div>
        <div className="mfoot">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-ok" disabled={busy} onClick={submit}>Add Project</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Slash commands
// ─────────────────────────────────────────────────────────────
const SLASHES = [
  { cmd: '/new',      desc: 'New session in this project' },
  { cmd: '/sessions', desc: 'List sessions' },
  { cmd: '/fork',     desc: 'Fork current session' },
  { cmd: '/clear',    desc: 'Clear context' },
  { cmd: '/export',   desc: 'Export messages as JSON' },
];

function SlashMenu({ query, selIdx, onSelect }) {
  const hits = SLASHES.filter(s => s.cmd.startsWith(query));
  if (!hits.length) return null;
  return (
    <div className="slash-pop">
      {hits.map((s, i) => (
        <div key={s.cmd} className={`sl-row${i === selIdx ? ' sel' : ''}`} onClick={() => onSelect(s.cmd)}>
          <span className="sl-cmd">{s.cmd}</span>
          <span className="sl-desc">{s.desc}</span>
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MessageInput
// ─────────────────────────────────────────────────────────────
function MessageInput({ onSend, disabled }) {
  const [text,    setText]    = useState('');
  const [focused, setFocused] = useState(false);
  const [hist,    setHist]    = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const [slashQ,  setSlashQ]  = useState('');
  const [slashSel,setSlashSel]= useState(0);
  const ta = useRef();

  function resize() {
    if (!ta.current) return;
    ta.current.style.height = 'auto';
    ta.current.style.height = Math.min(ta.current.scrollHeight, 150) + 'px';
  }

  function onChange(e) {
    const v = e.target.value;
    setText(v); resize();
    const word = v.split('\n')[0].split(' ')[0];
    if (v.startsWith('/') && !v.includes(' ') && v.length > 0) { setSlashQ(word); setSlashSel(0); }
    else setSlashQ('');
  }

  function onKey(e) {
    const hits = SLASHES.filter(s => s.cmd.startsWith(slashQ));
    if (slashQ && hits.length) {
      if (e.key === 'ArrowDown') { e.preventDefault(); setSlashSel(i => (i+1)%hits.length); return; }
      if (e.key === 'ArrowUp')   { e.preventDefault(); setSlashSel(i => (i-1+hits.length)%hits.length); return; }
      if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) { e.preventDefault(); doSelect(hits[slashSel].cmd); return; }
      if (e.key === 'Escape') { setSlashQ(''); return; }
    }
    if (e.key === 'ArrowUp' && ta.current?.selectionStart === 0 && hist.length) {
      e.preventDefault();
      const ni = Math.min(histIdx+1, hist.length-1); setHistIdx(ni);
      setText(hist[hist.length-1-ni]); return;
    }
    if (e.key === 'ArrowDown' && histIdx >= 0) {
      e.preventDefault();
      const ni = histIdx-1; setHistIdx(ni);
      setText(ni < 0 ? '' : hist[hist.length-1-ni]); return;
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  }

  function doSelect(cmd) { setText(''); setSlashQ(''); onSend({ slash: cmd }); }
  function submit() {
    const v = text.trim(); if (!v || disabled) return;
    if (v.startsWith('/')) {
      const w = v.split(' ')[0];
      const h = SLASHES.find(s => s.cmd === w);
      if (h) { setText(''); setSlashQ(''); onSend({ slash: w }); return; }
    }
    setHist(prev => [...prev.filter(x => x !== v), v]);
    setHistIdx(-1);
    setText(''); setSlashQ('');
    setTimeout(resize, 0);
    onSend({ text: v });
  }

  return (
    <div className="inp-area">
      <div className="inp-rel">
        {slashQ && <SlashMenu query={slashQ} selIdx={slashSel} onSelect={doSelect} />}
        <div className={`inp-shell${focused ? ' focused' : ''}`}>
          <textarea ref={ta} className="msg-ta" rows={1}
            placeholder="Message opencode… (/ for commands)"
            value={text} onChange={onChange} onKeyDown={onKey}
            onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} />
          <div className="inp-foot">
            <span className="inp-hint"><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline · <kbd>↑</kbd> history</span>
            <button className="send-btn" disabled={disabled || !text.trim()} onClick={submit}>Send ↵</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────
function App() {
  const { toast, toastEl } = useToast();

  // Connection
  const [status,   setStatus]   = useState({ ok: false, label: 'connecting…' });
  // All opencode sessions (flat list from API)
  const [ocSessions, setOcSessions] = useState([]);

  // Projects (locally stored: { id, name, path, sessionIds[] })
  const [projects,    setProjects]    = useState(loadProjects);
  const [expandedIds, setExpandedIds] = useState(() => new Set());

  // Current session
  const [curSessId, setCurSessId] = useState(null);
  const [curProjId, setCurProjId] = useState(null);
  const [messages,  setMessages]  = useState(null);
  const [thinking,  setThinking]  = useState(false);

  // UI
  const [drawerOpen,   setDrawerOpen]   = useState(false);
  const [newProjOpen,  setNewProjOpen]  = useState(false);

  // SSE
  const evtRef    = useRef(null);
  const abortRef  = useRef(false);  // tracks in-flight request

  // ── Boot ───────────────────────────────────────────────
  useEffect(() => { boot(); }, []);

  async function boot() {
    try {
      const h = await oc.health();
      setStatus({ ok: true, label: 'v' + (h.version ?? '?') });
      await refreshSessions();
    } catch {
      setStatus({ ok: false, label: 'opencode offline' });
      setTimeout(boot, 4000);
    }
  }

  async function refreshSessions() {
    const r = await oc.listSessions();
    setOcSessions(Array.isArray(r) ? r : (r?.sessions ?? []));
  }

  // ── SSE: global event stream ────────────────────────────
  // We subscribe once and use it to know when a response is complete.
  useEffect(() => {
    startGlobalSSE();
    return () => { evtRef.current?.close(); };
  }, []);

  function startGlobalSSE() {
    if (evtRef.current) { evtRef.current.close(); }
    const es = new EventSource(oc.eventUrl());
    evtRef.current = es;
    es.onopen = () => {};
    es.onmessage = e => {
      try {
        const evt = JSON.parse(e.data);
        onGlobalEvent(evt);
      } catch {}
    };
    es.onerror = () => {
      // Reconnect after a delay — don't spam
      setTimeout(() => { if (evtRef.current === es) startGlobalSSE(); }, 3000);
    };
  }

  // curSessId ref so the SSE handler can read it without stale closure
  const curSessRef = useRef(curSessId);
  useEffect(() => { curSessRef.current = curSessId; }, [curSessId]);

  function onGlobalEvent(evt) {
    if (!evt?.type) return;
    const t = evt.type;
    // When the active session's assistant message finishes, reload messages
    if (t === 'assistant.message.completed' || t === 'message.completed') {
      const sessId = evt.sessionID ?? evt.properties?.sessionID;
      if (sessId && sessId === curSessRef.current) {
        setThinking(false);
        loadMessages(sessId);
      }
    }
  }

  // ── Load messages ───────────────────────────────────────
  async function loadMessages(sessId) {
    try {
      const r = await oc.listMessages(sessId);
      setMessages(Array.isArray(r) ? r : (r?.messages ?? []));
    } catch { setMessages([]); }
  }

  // ── Select session ──────────────────────────────────────
  async function selectSession(projId, sessId) {
    setCurProjId(projId);
    setCurSessId(sessId);
    setMessages(null);
    setThinking(false);
    setDrawerOpen(false);
    await loadMessages(sessId);
  }

  // ── Derived current project / session ───────────────────
  const curProj = projects.find(p => p.id === curProjId);
  const curSess = ocSessions.find(s => s.id === curSessId);
  const sessName = curSess?.title ?? (curSessId ? curSessId.slice(0,10) + '…' : null);

  // Sessions belonging to a project (stored as sessionIds array on project)
  function projSessions(proj) {
    return (proj.sessionIds ?? [])
      .map(id => ocSessions.find(s => s.id === id))
      .filter(Boolean);
  }

  // ── Projects CRUD ───────────────────────────────────────
  function addProject({ name, path }) {
    const proj = { id: Date.now().toString(), name, path: path || '', sessionIds: [] };
    const next = [...projects, proj];
    setProjects(next); saveProjects(next);
    setExpandedIds(prev => new Set([...prev, proj.id]));
    setNewProjOpen(false);
    toast('Project added');
  }

  function removeProject(id) {
    if (!confirm('Remove this project? (Sessions in opencode are not deleted)')) return;
    const next = projects.filter(p => p.id !== id);
    setProjects(next); saveProjects(next);
    if (curProjId === id) { setCurProjId(null); setCurSessId(null); setMessages(null); }
  }

  function linkSession(projId, sessId) {
    const next = projects.map(p =>
      p.id === projId && !p.sessionIds.includes(sessId)
        ? { ...p, sessionIds: [...p.sessionIds, sessId] }
        : p
    );
    setProjects(next); saveProjects(next);
  }

  function unlinkSession(projId, sessId) {
    const next = projects.map(p =>
      p.id === projId ? { ...p, sessionIds: p.sessionIds.filter(id => id !== sessId) } : p
    );
    setProjects(next); saveProjects(next);
    if (curSessId === sessId) { setCurSessId(null); setMessages(null); }
  }

  // ── Create new session for a project ───────────────────
  async function newSessionInProject(proj) {
    try {
      const title = proj.name + ' · ' + new Date().toLocaleDateString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      const s = await oc.createSession(title);
      linkSession(proj.id, s.id);
      await refreshSessions();
      await selectSession(proj.id, s.id);

      // Send priming message if project has a subfolder
      if (proj.path) {
        setThinking(true);
        const primer =
          `For this entire session, your working directory is \`${proj.path}\`.\n` +
          `All file reads, writes, edits, and shell commands must use \`${proj.path}\` as the project root.\n` +
          `Always cd into \`${proj.path}\` before running shell commands.\n` +
          `Reply only: "Understood. Working in \`${proj.path}\`."`;
        try {
          const r = await oc.sendMessage(s.id, [{ type: 'text', text: primer }]);
          // sendMessage is blocking — response comes back directly
          setThinking(false);
          // Reload to get both user + assistant priming messages
          await loadMessages(s.id);
        } catch {
          setThinking(false);
        }
      }
      toast('Session created');
    } catch(e) { toast('Failed: ' + e.message); }
  }

  // ── Send message ────────────────────────────────────────
  async function handleSend({ text, slash }) {
    if (slash) { await handleSlash(slash); return; }
    if (!text || !curSessId || thinking) return;

    setThinking(true);
    // Optimistic: append user message locally
    const optMsg = { info: { role: 'user', id: '_opt_' + Date.now() }, parts: [{ type: 'text', text }] };
    setMessages(prev => [...(prev ?? []), optMsg]);

    try {
      // Blocking call — waits for complete response
      const r = await oc.sendMessage(curSessId, [{ type: 'text', text }]);
      setThinking(false);
      // Reload full message list (gets both messages with proper IDs)
      await loadMessages(curSessId);
    } catch(e) {
      setThinking(false);
      setMessages(prev => [...(prev ?? []),
        { info: { role: 'assistant', id: '_err_' + Date.now() },
          parts: [{ type: 'text', text: 'Error: ' + e.message }] }
      ]);
    }
  }

  // ── Slash commands ──────────────────────────────────────
  async function handleSlash(cmd) {
    switch (cmd) {
      case '/new':
        if (!curProj) { toast('Select a project first'); return; }
        await newSessionInProject(curProj);
        break;
      case '/sessions':
        if (!curProj) { toast('Select a project first'); return; }
        const list = projSessions(curProj);
        const txt = list.length
          ? list.map(s => (s.id === curSessId ? '▸ ' : '  ') + (s.title ?? s.id.slice(0,12))).join('\n')
          : '  (none)';
        appendSysMsg('Sessions in ' + curProj.name + ':\n' + txt);
        break;
      case '/fork':
        if (!curSessId || !curProjId) { toast('No active session'); return; }
        try {
          const s = await oc.forkSession(curSessId);
          linkSession(curProjId, s.id);
          await refreshSessions();
          await selectSession(curProjId, s.id);
          toast('Session forked');
        } catch(e) { toast('Fork failed: ' + e.message); }
        break;
      case '/clear':
        setMessages([]);
        toast('Cleared locally');
        break;
      case '/export':
        if (!messages?.length) { toast('Nothing to export'); return; }
        try {
          const blob = new Blob([JSON.stringify({ session: curSessId, messages }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `oc-${curSessId?.slice(0,8) ?? 'export'}.json`;
          a.click();
        } catch { toast('Export failed'); }
        break;
    }
  }

  function appendSysMsg(text) {
    setMessages(prev => [...(prev ?? []),
      { info: { role: 'system', id: '_sys_' + Date.now() }, parts: [{ type: 'text', text }] }
    ]);
  }

  // ── Abort ───────────────────────────────────────────────
  async function abort() {
    if (!curSessId) return;
    try { await oc.abortSession(curSessId); } catch {}
    setThinking(false);
  }

  // ── Keyboard shortcuts ──────────────────────────────────
  useEffect(() => {
    function onKey(e) {
      if (e.key === 'Escape') { setNewProjOpen(false); setDrawerOpen(false); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); setNewProjOpen(true); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // ── Toggle project expand ───────────────────────────────
  function toggleExpand(id) {
    setExpandedIds(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }

  // ── Render ──────────────────────────────────────────────
  return (
    <>
      {/* Veil for mobile drawer */}
      <div className={`veil${drawerOpen ? ' open' : ''}`} onClick={() => setDrawerOpen(false)} />

      {/* Sidebar */}
      <nav className={`sidebar${drawerOpen ? ' open' : ''}`}>
        <div className="sb-hd">
          <div className="logo"><div className="logo-orb" />opencode</div>
          <button className="sb-x" onClick={() => setDrawerOpen(false)}>✕</button>
        </div>

        <button className="new-proj-btn" onClick={() => setNewProjOpen(true)}>
          <span style={{fontSize:15}}>＋</span> New project…
        </button>

        <div className="sb-scroll">
          {projects.length === 0 && (
            <div style={{padding:'12px 10px',fontSize:11,color:'var(--text3)',lineHeight:1.7}}>
              No projects yet.<br/>Add one to get started.
            </div>
          )}

          {projects.map(proj => {
            const isExpanded = expandedIds.has(proj.id);
            const sessions   = projSessions(proj);
            return (
              <div key={proj.id} className="proj-group">
                <div className={`proj-row${curProjId === proj.id ? ' active-proj' : ''}`}
                  onClick={() => { toggleExpand(proj.id); }}>
                  <span className={`proj-chevron${isExpanded ? ' open' : ''}`}>›</span>
                  <span className="proj-ico">📁</span>
                  <div className="proj-info">
                    <div className="proj-name">{proj.name}</div>
                    {proj.path && <div className="proj-path">{proj.path}</div>}
                  </div>
                  <button className="proj-del" onClick={e => { e.stopPropagation(); removeProject(proj.id); }}>✕</button>
                </div>

                {isExpanded && (
                  <div className="sess-list">
                    {sessions.map(s => (
                      <div key={s.id}
                        className={`sess-row${s.id === curSessId ? ' active' : ''}`}
                        onClick={() => selectSession(proj.id, s.id)}>
                        <span className="sess-name">{s.title ?? s.id.slice(0,14) + '…'}</span>
                        <button className="sess-del" onClick={e => { e.stopPropagation(); unlinkSession(proj.id, s.id); }}>✕</button>
                      </div>
                    ))}
                    <div className="new-sess-row" onClick={() => { newSessionInProject(proj); setDrawerOpen(false); }}>
                      <span>＋</span> New session
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div className="sb-ft">
          <span className={`s-dot${status.ok ? ' on' : ''}`} />
          <span>{status.label}</span>
        </div>
      </nav>

      {/* Main */}
      <div className="main">
        {/* Topbar */}
        <div className="topbar">
          <button className="burger" onClick={() => setDrawerOpen(o => !o)}>
            <span /><span /><span />
          </button>
          <div className="tb-info">
            <div className="tb-name">{curProj?.name ?? 'opencode'}</div>
            <div className="tb-sub">{sessName ?? (curProj ? 'no session selected' : 'no project selected')}</div>
          </div>
          {thinking
            ? <>
                <span className="tb-status thinking">● thinking</span>
                <button className="tb-abort" onClick={abort}>■ stop</button>
              </>
            : curSessId
              ? <span className="tb-status idle">ready</span>
              : null
          }
        </div>

        <Thread
          messages={messages}
          thinking={thinking}
          contextPath={curProj?.path ?? null}
        />

        <MessageInput
          onSend={handleSend}
          disabled={!curSessId || thinking}
        />
      </div>

      <NewProjectModal
        open={newProjOpen}
        onClose={() => setNewProjOpen(false)}
        onDone={addProject}
        toast={toast}
      />

      {toastEl}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
